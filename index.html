<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PORTFÓLIO OFICIAL 2026 🔥 ATUALIZADO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="tech-bg"></div>

<div class="urgent-banner">🔥 ESTOQUE ATUALIZADO AGORA MESMO — PROMOÇÕES IMPERDÍVEIS! 🔥</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <img src="images/logo.png" alt="PHONE STORE Logo">
    </div>
  </div>
</div>
</header>
 <a href="ranking.html" style="
  display:inline-block;
  margin:20px;
  padding:10px 20px;
  background:#22c55e;
  color:#000;
  font-weight:700;
  border-radius:8px;
  text-decoration:none;
">
  🏆 Ver Ranking Completo
</a>

<section class="hero">
  <h2>PORTFÓLIO OFICIAL 2026</h2>
  <p>Tecnologia de ponta com os melhores preços da cidade!</p>


<section class="tabs-container">
  <div class="tabs">
    <button class="tab-btn active" onclick="setCategory('all', this)">📱 TODOS</button>
    <button class="tab-btn" onclick="setCategory('Smartphone', this)">📲 SMARTPHONES</button>
    <button class="tab-btn" onclick="setCategory('Som', this)">🔊 CAIXAS DE SOM</button>
    <button class="tab-btn" onclick="setCategory('Tablet', this)">🖥️ TABLETS</button>
  </div>
</section>

<div class="filter-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Busque..." oninput="renderProducts()">
</div>

<div class="filter-tools">
</div>



<section class="products-section" id="productsContainer"></section>

<footer></footer>


<script src="products.js"></script>

<script>
let currentBrand = 'all';
let currentCategory = 'all';

let currentSort = localStorage.getItem('ps_sort') || 'featured';
let currentPriceRange = localStorage.getItem('ps_price_range') || 'all';

const BRASIL_CARD = { label: 'BrasilCard', url: 'https://www.brasilcard.net/bca/lojista/login' };
const ODRES = { label: 'OdresCred', url: 'https://vendas.odrescred.com.br/login' };
const PAYJOY = { label: 'PayJoy', url: 'https://app.payjoy.com/merchant3/merchant-login' };
const WATU = { label: 'Watu', url: 'https://br-simu.watu.com/#/login' };



function initUpdateBar() {
  const lastUpdateEl = document.getElementById('lastUpdateText');
  const sourceEl = document.getElementById('updateSourceText');

  if (lastUpdateEl) lastUpdateEl.textContent = PORTFOLIO_META.lastUpdate || '--/--/----';
  if (sourceEl) sourceEl.textContent = PORTFOLIO_META.source ? ` • Fonte: ${PORTFOLIO_META.source}` : '';
}

function openChangelog() {
  const backdrop = document.getElementById('changelogBackdrop');
  const body = document.getElementById('changelogBody');
  if (!backdrop || !body) return;

  body.innerHTML = CHANGELOG.map(entry => {
    const items = (entry.items || []).map(i => `<li>${escapeHtml(i)}</li>`).join('');
    return `
      <div class="changelog-entry">
        <div class="changelog-date"><strong>${escapeHtml(entry.date || '')}</strong> — ${escapeHtml(entry.title || '')}</div>
        <ul class="changelog-list">${items}</ul>
      </div>
    `;
  }).join('');

  backdrop.style.display = 'flex';
}

function closeChangelog(e) {
  if (e && e.target && e.target.id !== 'changelogBackdrop') return;

  const backdrop = document.getElementById('changelogBackdrop');
  if (backdrop) backdrop.style.display = 'none';
}

function escapeHtml(str) {
  return String(str || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function setCategory(category, el) {
  currentCategory = category;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderProducts();
}

function setBrand(brand, el) {
  currentBrand = brand;
  document.querySelectorAll('.brand-pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  renderProducts();
}

function setSort(sortValue) {
  currentSort = sortValue;
  localStorage.setItem('ps_sort', currentSort);
  renderProducts();
}

function setPriceRange(rangeValue) {
  currentPriceRange = rangeValue;
  localStorage.setItem('ps_price_range', currentPriceRange);
  renderProducts();
}

function isWithinPixRange(pixValue, range) {
  const v = Number(pixValue);
  if (!Number.isFinite(v)) return false;

  switch (range) {
    case '0-799': return v <= 799;
    case '0-1199': return v <= 1199;
    case '0-1699': return v <= 1699;
    case '0-2000': return v <= 2000;
    case '2000+': return v > 2000;
    case 'all':
    default:
      return true;
  }
}

function moneyBR(value) {
  return Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function getDiscount(p) {
  const price = Number(p.price);
  const pix = Number(p.pix);
  if (!Number.isFinite(price) || !Number.isFinite(pix)) return 0;
  return Math.max(0, price - pix);
}

function getFinanceButtons(product) {
  if (
    product.brand === 'Apple' ||
    product.category === 'Tablet' ||
    product.category === 'Som'
  ) {
    return [BRASIL_CARD];
  }

  if (product.brand === 'Samsung') {
    return [BRASIL_CARD, ODRES, PAYJOY, WATU];
  }

  if (
    product.brand === 'Realme' ||
    product.brand === 'Motorola' ||
    product.brand === 'Xiaomi'
  ) {
    return [BRASIL_CARD, ODRES, PAYJOY];
  }

  return [BRASIL_CARD];
}

function normalizeImgPath(img) {
  if (!img) return '';
  const s = String(img);
  if (s.startsWith('http://') || s.startsWith('https://')) return s;
  if (s.startsWith('images/')) return s;
  return `images/${s}`;
}

function dedupeProducts(list) {
  const map = new Map();
  list.forEach(p => {
    const key = `${p.category}__${p.brand}__${p.name}`.toLowerCase();
    map.set(key, p);
  });
  return [...map.values()];
}

function renderProducts() {
  const container = document.getElementById('productsContainer');
  const searchEl = document.getElementById('searchInput');
  const search = (searchEl ? searchEl.value : '').toLowerCase();

  container.innerHTML = '';

  if (typeof allProducts === 'undefined') {
    container.innerHTML = `<p style="color:#aaa;padding:20px;">Erro ao carregar produtos (allProducts indefinido).</p>`;
    return;
  }

  const normalized = dedupeProducts(allProducts).map(p => ({
    ...p,
    img: normalizeImgPath(p.img),
  }));

  let filtered = normalized.filter(p => {
    const matchCategory = currentCategory === 'all' || p.category === currentCategory;
    const matchBrand = currentBrand === 'all' || p.brand === currentBrand;
    const matchSearch =
      (p.name || '').toLowerCase().includes(search) ||
      (p.brand || '').toLowerCase().includes(search);

    const matchPixRange = isWithinPixRange(p.pix, currentPriceRange);

    return matchCategory && matchBrand && matchSearch && matchPixRange;
  });

  filtered.sort((a, b) => {
    const apix = Number(a.pix) || 0;
    const bpix = Number(b.pix) || 0;

    if (currentSort === 'pix_asc') return apix - bpix;
    if (currentSort === 'pix_desc') return bpix - apix;

    if (currentSort === 'discount_desc') {
      const ad = getDiscount(a);
      const bd = getDiscount(b);
      return bd - ad;
    }

    if (currentSort === 'name_asc') {
      const an = (a.name || '').toLowerCase();
      const bn = (b.name || '').toLowerCase();
      return an.localeCompare(bn);
    }

    const aScore = (a.badge ? 10 : 0) + Math.min(10, getDiscount(a) / 200);
    const bScore = (b.badge ? 10 : 0) + Math.min(10, getDiscount(b) / 200);
    return bScore - aScore;
  });

  const brands = [...new Set(filtered.map(p => p.brand))];

  if (brands.length === 0) {
    container.innerHTML = `<p style="color:#aaa;padding:20px;">Nenhum produto encontrado com esses filtros.</p>`;
    return;
  }

  brands.forEach(brand => {
    const section = document.createElement('div');
    section.className = 'brand-section';
    section.innerHTML = `<div class="section-header"><h3>${brand}</h3></div>`;

    const grid = document.createElement('div');
    grid.className = 'products-grid';

    filtered
      .filter(p => p.brand === brand)
      .forEach(p => {
        const badgeHtml = p.badge ? `<div class="badge">${escapeHtml(p.badge)}</div>` : '';

        const priceCard = moneyBR(p.price);
        const pricePix = moneyBR(p.pix);
        const showCardPrice = Number(p.pix) < Number(p.price);

        const discount = getDiscount(p);
        const discountHtml = (showCardPrice && discount > 0)
          ? `<div class="discount-tag">Economia no PIX: ${moneyBR(discount)}</div>`
          : '';

        const financeList = getFinanceButtons(p);
        const financeButtonsHtml = financeList.map(f => `
          <a href="${f.url}" target="_blank" class="btn-finance">
            ${f.label}
          </a>
        `).join('');

        grid.innerHTML += `
          <div class="product-card">
            ${badgeHtml}
            <div class="card-img">
              <img src="${p.img}" alt="${escapeHtml(p.name)}"
                onerror="this.src='images/logo.png'">
            </div>

            <div class="card-info">
              <div class="card-brand">${escapeHtml(p.brand)}</div>
              <div class="card-name">${escapeHtml(p.name)}</div>

              <div class="price-block">
                ${showCardPrice ? `<div class="price-card">${priceCard}</div>` : ''}
                <div class="price-pix">${pricePix}</div>
                <span class="price-label">À VISTA NO PIX</span>
                ${discountHtml}
              </div>

              <div class="finance-actions">
                ${financeButtonsHtml}
              </div>
            </div>
          </div>
        `;
      });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const sortSelect = document.getElementById('sortSelect');
  if (sortSelect) sortSelect.value = currentSort;

  const priceRangeSelect = document.getElementById('priceRangeSelect');
  if (priceRangeSelect) priceRangeSelect.value = currentPriceRange;

  initUpdateBar();
  renderProducts();
});
</script>
<div class="modal-backdrop" id="changelogBackdrop" onclick="closeChangelog(event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3>📌 Mudanças</h3>
      <button class="modal-close" onclick="closeChangelog()">✕</button>
    </div>
    <div class="modal-body" id="changelogBody"></div>
  </div>
</div>

</body>
</html>
