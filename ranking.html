<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ranking Phone Store</title>

<style>
/* (SEU CSS ORIGINAL — NÃO ALTEREI NADA) */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(180deg, #0b0b0b, #111);
    color: white;
}
.header {
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
}
.btn {
    background: #ffd700;
    color: black;
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}
.categorias { padding: 20px 30px; }
.cat-btn {
    margin-right:10px;
    padding:8px 12px;
    border-radius:8px;
    background:#1a1a1a;
    cursor:pointer;
    transition:0.2s;
}
.cat-btn:hover { background:#ffd700; color:black; }
.search { padding: 0 30px 10px; }
.search input {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    background:#1a1a1a;
    color:white;
}
.funil-img { display:none; text-align:center; padding:10px; }
.funil-img img { max-width:250px; }
.ranking { padding: 10px 30px 40px; }
.item {
    margin-bottom: 15px;
    padding:12px;
    border-radius:10px;
    background:#141414;
    transition:0.3s;
}
.item:hover { transform: scale(1.01); }
.top1 { border:1px solid gold; box-shadow: 0 0 10px gold; }
.top2 { border:1px solid silver; }
.top3 { border:1px solid #cd7f32; }
.posicao { font-weight:bold; margin-bottom:5px; }
.barra {
    height: 10px;
    background:#222;
    border-radius:5px;
    overflow:hidden;
}
.progresso {
    height:100%;
    background: linear-gradient(90deg,#ffd700,#ffae00);
    width:0%;
    transition: width 1.2s ease;
}
.valor { margin-top:5px; font-size:14px; }
</style>
</head>

<body>

<div class="header">
    <h2>🏆 Ranking Geral</h2>
    <a href="index.html" class="btn">Voltar</a>
</div>

<div class="categorias">
    <span class="cat-btn" onclick="mostrarVendedores()">💰 Geral</span>
    <span class="cat-btn" onclick="filtrar('acessorios')">📦 Acessórios</span>
    <span class="cat-btn" onclick="filtrar('aparelhos')">📱 Aparelhos</span>
    <span class="cat-btn" onclick="filtrar('caixa')">🔊 Caixa</span>
    <span class="cat-btn" onclick="filtrar('protect')">🛡 Protect</span>
    <span class="cat-btn" onclick="carregarFunil()">🔥 Funil</span>
</div>

<div class="search">
    <input type="text" id="search" placeholder="Buscar...">
</div>

<div class="funil-img" id="funilImg">
    <img src="imagem_funil.png">
</div>

<div class="ranking" id="ranking"></div>

<script>

function parseBR(v){
    if(!v) return 0;
    return Number(v.toString().replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."))
}

function money(v){
    return v.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})
}

let dadosVendedores = []
let dadosFunil = []
let tipoRanking = "faturado"
let modo = "vendedores"

fetch("https://opensheet.elk.sh/1Sz4W_66JfV1E0On0tOJAQmIXGvTd5IZ8Vdm1wTVxZfI/VENDEDORES_TOTAIS").then(r=>r.json())
.then(data=>{
    dadosVendedores = data.map(item => ({
        nome: item["Nome Fantasia"],
        faturado: parseBR(item["FATURADO"]),
        acessorios: parseBR(item["ACESSORIOS_VALOR"]),
        aparelhos: parseBR(item["APARELHOS_VALOR"]),
        caixa: parseBR(item["CAIXA_SOM_VALOR"]),
        protect: parseBR(item["PROTECT_VALOR"]),
    }))
    .filter(d => d.faturado > 0)

    ordenar()
})

function ordenar(){
    dadosVendedores.sort((a,b)=> b[tipoRanking] - a[tipoRanking])
    dadosVendedores.forEach((d,i)=> d.pos = i+1)
    renderVendedores(dadosVendedores)
}

function mostrarVendedores(){
    modo = "vendedores"
    tipoRanking = "faturado" // 🔥 RESET CORRETO AQUI
    document.getElementById("funilImg").style.display = "none"
    ordenar()
}

function carregarFunil(){
    modo = "funil"
    document.getElementById("funilImg").style.display = "block"

    fetch("https://opensheet.elk.sh/1vMDMsdPbvzItkJyoSeGoDG40fhGZ1HUe3z7QgC0eZ4g/Métricas")
    .then(r=>r.json())
    .then(data=>{
        dadosFunil = data.map(item => ({
            nome: item["LOJAS_PDV"],
            valor: parseBR(item["FATURADO"])
        }))
        .filter(d => d.nome && d.valor > 0)

        dadosFunil.sort((a,b)=> b.valor - a.valor)
        dadosFunil.forEach((d,i)=> d.pos = i+1)

        renderFunil(dadosFunil)
    })
}

function medalha(pos){
    if(pos===1) return "🥇"
    if(pos===2) return "🥈"
    if(pos===3) return "🥉"
    return pos
}

function classeTop(pos){
    if(pos===1) return "item top1"
    if(pos===2) return "item top2"
    if(pos===3) return "item top3"
    return "item"
}

function renderVendedores(dados){
    const ranking = document.getElementById("ranking")
    ranking.innerHTML = ""

    const max = dados[0]?.[tipoRanking] || 1

    dados.forEach(d=>{
        const percent = (d[tipoRanking] / max) * 100

        ranking.innerHTML += `
        <div class="${classeTop(d.pos)}">
            <div class="posicao">${medalha(d.pos)} - ${d.nome.toUpperCase()}</div>
            <div class="barra">
                <div class="progresso" style="width:${percent}%"></div>
            </div>
            <div class="valor">${money(d[tipoRanking])}</div>
        </div>`
    })
}

function renderFunil(dados){
    const ranking = document.getElementById("ranking")
    ranking.innerHTML = ""

    const max = dados[0]?.valor || 1

    dados.forEach(d=>{
        const percent = (d.valor / max) * 100

        ranking.innerHTML += `
        <div class="${classeTop(d.pos)}">
            <div class="posicao">${medalha(d.pos)} - ${d.nome.toUpperCase()}</div>
            <div class="barra">
                <div class="progresso" style="width:${percent}%"></div>
            </div>
            <div class="valor">${money(d.valor)}</div>
        </div>`
    })
}

function filtrar(tipo){
    tipoRanking = tipo
    modo = "vendedores"
    document.getElementById("funilImg").style.display = "none"
    ordenar()
}

document.getElementById("search").addEventListener("keyup", function(){
    const v = this.value.toLowerCase()

    if(modo === "funil"){
        renderFunil(dadosFunil.filter(d => d.nome.toLowerCase().includes(v)))
    } else {
        renderVendedores(dadosVendedores.filter(d => d.nome.toLowerCase().includes(v)))
    }
})

</script>

</body>
</html>
