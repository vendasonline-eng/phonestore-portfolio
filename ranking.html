<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Store ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #FFD700;
    --primary-glow: rgba(255, 215, 0, 0.3);
    --bg: #050505;
    --card: rgba(20, 20, 25, 0.7);
    --border: rgba(255, 255, 255, 0.08);
    --up: #00ff88;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at top right, #0a0a15, #050505);
    color: white;
}

.header {
    padding: 25px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
}

.header h2 {
    margin: 0;
    font-weight: 900;
}

.header span { color: var(--primary); }

.btn-back {
    color: var(--primary);
    border: 1px solid var(--primary);
    padding: 10px 20px;
    border-radius: 50px;
    text-decoration: none;
}

.container { padding: 30px; }

.filter-bar {
    display: flex;
    justify-content: space-between;
    background: var(--card);
    padding: 15px 30px;
    border-radius: 100px;
    border: 1px solid var(--border);
    margin-bottom: 30px;
}

.cat-group { display: flex; gap: 10px; }

.cat-btn {
    background: #151515;
    padding: 10px 18px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    color: #aaa;
}

.cat-btn.active {
    background: var(--primary);
    color: black;
}

.search-input {
    background: #000;
    border: 1px solid #333;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
}

.rank-item {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 18px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.pos-badge {
    width: 50px;
    font-weight: bold;
    color: var(--primary);
}

.vendedor-info { flex: 1; }

.progress-bg {
    height: 6px;
    background: #111;
    border-radius: 10px;
    margin-top: 5px;
}

.progress-fill {
    height: 100%;
    background: var(--primary);
}

.val-total {
    color: var(--up);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
<h2>🏆 RANKING <span>VENDAS</span></h2>
<a href="index.html" class="btn-back">Sair</a>
</div>

<div class="container">

<div class="filter-bar">
    <div class="cat-group">
        <div class="cat-btn active" onclick="setRanking('faturado', this)">💰 Geral</div>
        <div class="cat-btn" onclick="setRanking('acessorios', this)">📦 Acessórios</div>
        <div class="cat-btn" onclick="setRanking('aparelhos', this)">📱 Aparelhos</div>
        <div class="cat-btn" onclick="setRanking('audio', this)">🎧 Som</div>
        <div class="cat-btn" onclick="setRanking('protect', this)">🛡 Protect</div>
        <div class="cat-btn" onclick="loadFunilLojas(this)">🏠 Funil Lojas</div>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="Buscar...">
</div>

<div id="rankingList"></div>

</div>

<script>
let vendedoresRaw = [];
let metricasRaw = [];
let currentTipo = "faturado";
let mode = "vendedores";

const parseVal = v => !v ? 0 : Number(v.toString().replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."))
const formatMoeda = v => v.toLocaleString('pt-BR',{style:'currency', currency:'BRL'})

// vendedores(João)
fetch("https://opensheet.elk.sh/1Sz4W_66JfV1E0On0tOJAQmIXGvTd5IZ8Vdm1wTVxZfI/VENDEDORES_TOTAIS")
.then(r => r.json())
.then(data => {
    vendedoresRaw = data.map((item, index) => ({
        nome: item["Nome Fantasia"],
        faturado: parseVal(item["FATURADO"]),
        acessorios: parseVal(item["ACESSORIOS_VALOR"]),
        aparelhos: parseVal(item["APARELHOS_VALOR"]),
        audio: parseVal(item["CAIXA_SOM_VALOR"]) + parseVal(item["CAIXA_JBL"]),
        protect: parseVal(item["PROTECT_VALOR"]),
        prevPos: index + 1
    })).filter(v => v.faturado > 0);

    updateDisplay();
});

//Funil(Larissa)
fetch("https://opensheet.elk.sh/1vMDMsdPbvzItkJyoSeGoDG40fhGZ1HUe3z7QgC0eZ4g/Métricas")
.then(r => r.json())
.then(data => {
    metricasRaw = data.map(m => ({
        nome: m["LOJAS_PDV"],
        faturado: parseVal(m["FATURADO"])
    }));
});

function updateDisplay() {
    const list = document.getElementById("rankingList");
    list.innerHTML = "";

    let dados = mode === "vendedores" ? [...vendedoresRaw] : [...metricasRaw];

    dados.sort((a,b) => (b[currentTipo] || 0) - (a[currentTipo] || 0));

    const max = Math.max(...dados.map(d => d[currentTipo]), 1);

    dados.forEach((d,i) => {
        const perc = (d[currentTipo]/max)*100;

        list.innerHTML += `
        <div class="rank-item">
            <div class="pos-badge">${i+1}º</div>
            <div class="vendedor-info">
                <div>${(d.nome || '').toUpperCase()}</div>
                <div class="progress-bg">
                    <div class="progress-fill" style="width:${perc}%"></div>
                </div>
            </div>
            <div class="val-total">${formatMoeda(d[currentTipo])}</div>
        </div>`;
    });
}

function setRanking(tipo, btn){
    mode = "vendedores";
    currentTipo = tipo;
    toggle(btn);
    updateDisplay();
}

function loadFunilLojas(btn){
    mode = "funil";
    currentTipo = "faturado";
    toggle(btn);
    updateDisplay();
}

function toggle(btn){
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

document.getElementById('searchInput').addEventListener('input', e=>{
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('.rank-item').forEach(item=>{
        item.style.display = item.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
    });
});
</script>

</body>
</html>
