<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phone Store | Portfólio 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
:root {
  --primary: #ffd700;
  --bg: #050505;
  --card: #111;
  --text: #fff;
  --muted: #aaa;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: radial-gradient(circle at top, #0a0a15, #050505);
  color: var(--text);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid #222;
}

.logo img { height: 40px; }

.btn-ranking {
  background: var(--primary);
  color: #000;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 700;
  text-decoration: none;
}

.hero {
  text-align: center;
  padding: 40px 20px 20px;
}

.hero h2 { font-size: 32px; margin-bottom: 10px; }
.hero p { color: var(--muted); }

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
  flex-wrap: wrap;
}

.tab-btn {
  background: #151515;
  border: 1px solid #222;
  padding: 10px 18px;
  border-radius: 50px;
  color: var(--muted);
  cursor: pointer;
}

.tab-btn.active {
  background: var(--primary);
  color: black;
}

.filter-bar {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.search-input {
  width: 300px;
  padding: 12px 150px;
  border-radius: 50px;
  border: 1px solid #333;
  background: #000;
  color: white;
  text-align:center;
}

.products-section { padding: 20px; }

.brand-section { margin-bottom: 40px; }

.section-header h3 {
  margin-bottom: 15px;
  border-left: 4px solid var(--primary);
  padding-left: 10px;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.product-card {
  background: var(--card);
  border-radius: 18px;
  padding: 15px;
  transition: 0.3s;
  border: 1px solid #222;
}

.product-card:hover {
  transform: translateY(-5px);
  border-color: var(--primary);
}

.card-img img {
  width: 100%;
  height: 150px;
  object-fit: contain;
}

.card-brand {
  font-size: 12px;
  color: var(--muted);
}

.card-name {
  font-weight: 700;
  margin: 5px 0;
}

.price-card {
  text-decoration: line-through;
  font-size: 12px;
  color: #777;
}

.price-pix {
  font-size: 18px;
  font-weight: 800;
  color: var(--primary);
}

.price-label {
  font-size: 10px;
  color: var(--muted);
}

.discount-tag {
  font-size: 11px;
  color: #00ff88;
}

.finance-actions {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.btn-finance {
  flex: 1;
  text-align: center;
  font-size: 10px;
  padding: 6px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 700;
  border: 1px solid #333;
  background: #000;
  color: white;
  transition: 0.2s;
}

.btn-finance:hover {
  border-color: var(--primary);
  color: var(--primary);
}

@media(max-width:600px){
  .search-input { width: 90%; }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="images/logo.png">
  </div>
  <a href="ranking.html" class="btn-ranking">🏆 Ranking</a>
</header>

<section class="hero">
  <h2>PORTFÓLIO 2026</h2>
  <p>Tecnologia premium com preço de oportunidade🔥</p>
</section>

<div class="tabs">
  <button class="tab-btn active" onclick="setCategory('all', this)">📱 Todos</button>
  <button class="tab-btn" onclick="setCategory('Smartphone', this)">📲 Smartphones</button>
  <button class="tab-btn" onclick="setCategory('Som', this)">🔊 Som</button>
  <button class="tab-btn" onclick="setCategory('Tablet', this)">🖥 Tablets</button>
</div>

<div class="filter-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Buscar produto..." oninput="renderProducts()">
</div>

<section class="products-section" id="productsContainer"></section>

<script src="products.js"></script>

<script>
const BRASIL_CARD = { label: 'BrasilCard', url: 'https://www.brasilcard.net/bca/lojista/login' };
const ODRES = { label: 'OdresCred', url: 'https://vendas.odrescred.com.br/login' };
const PAYJOY = { label: 'PayJoy', url: 'https://app.payjoy.com/merchant3/merchant-login' };
const WATU = { label: 'Watu', url: 'https://br-simu.watu.com/#/login' };

let currentCategory = 'all';

function setCategory(category, el) {
  currentCategory = category;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function moneyBR(value) {
  return Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function getFinanceButtons(product) {
  if (product.brand === 'Samsung') return [BRASIL_CARD, ODRES, PAYJOY, WATU];
  if (['Xiaomi','Realme','Motorola'].includes(product.brand)) return [BRASIL_CARD, ODRES, PAYJOY];
  return [BRASIL_CARD];
}

function renderProducts() {
  const container = document.getElementById('productsContainer');
  const search = document.getElementById('searchInput').value.toLowerCase();

  container.innerHTML = '';

  let filtered = allProducts.filter(p =>
    (currentCategory === 'all' || p.category === currentCategory) &&
    p.name.toLowerCase().includes(search)
  );

  const brands = [...new Set(filtered.map(p => p.brand))];

  brands.forEach(brand => {
    const section = document.createElement('div');
    section.className = 'brand-section';
    section.innerHTML = `<div class="section-header"><h3>${brand}</h3></div>`;

    const grid = document.createElement('div');
    grid.className = 'products-grid';

    filtered.filter(p => p.brand === brand).forEach(p => {
      const financeButtons = getFinanceButtons(p).map(f => `
        <a href="${f.url}" target="_blank" class="btn-finance">${f.label}</a>
      `).join('');

      grid.innerHTML += `
        <div class="product-card">
          <div class="card-img">
            <img src="${p.img}">
          </div>

          <div class="card-brand">${p.brand}</div>
          <div class="card-name">${p.name}</div>

          <div class="price-card">${moneyBR(p.price)}</div>
          <div class="price-pix">${moneyBR(p.pix)}</div>
          <div class="price-label">À vista no PIX</div>

          <div class="finance-actions">
            ${financeButtons}
          </div>
        </div>
      `;
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

renderProducts();
</script>

</body>
</html>
